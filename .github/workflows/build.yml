name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      # 文档修改不触发
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    # ==================== .NET Framework 4.7.2 (客户端) ====================
    - name: 安装 MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: 下载 NuGet CLI 并还原包
      shell: pwsh
      run: |
        Invoke-WebRequest -UseBasicParsing -OutFile nuget.exe https://dist.nuget.org/win-x86-commandline/latest/nuget.exe
        $proj = Get-ChildItem Client/*.csproj | Select-Object -First 1
        .\nuget.exe restore $proj.FullName -PackagesDirectory Client/packages -NonInteractive

    - name: 编译客户端 (Release)
      shell: cmd
      run: msbuild Client/U盘文件复制.csproj /t:Build /p:Configuration=Release /p:Platform=AnyCPU

    - name: 收集客户端产物
      shell: cmd
      run: |
        mkdir publish\Client
        xcopy Client\bin\Release\* publish\Client\ /E /Y
        # 删除不必要的文件
        if exist publish\Client\*.pdb del /Q publish\Client\*.pdb
        if exist publish\Client\*.xml del /Q publish\Client\*.xml

    # ==================== .NET 8 服务端 (多平台) ====================
    - name: 安装 .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: 编译服务端 (win-x64)
      run: dotnet publish Server/U盘文件复制.Server.csproj -c Release -r win-x64 --self-contained false -o publish/Server/win-x64

    - name: 编译服务端 (linux-x64)
      run: dotnet publish Server/U盘文件复制.Server.csproj -c Release -r linux-x64 --self-contained false -o publish/Server/linux-x64

    - name: 编译服务端 (osx-x64)
      run: dotnet publish Server/U盘文件复制.Server.csproj -c Release -r osx-x64 --self-contained false -o publish/Server/osx-x64

    - name: 清理服务端调试文件
      shell: pwsh
      run: |
        Get-ChildItem -Path publish/Server -Recurse -Include *.pdb | Remove-Item -Force

    # ==================== 打包 ZIP ====================
    - name: 提取版本号
      id: version
      shell: pwsh
      run: |
        $xml = [xml](Get-Content Client/U盘文件复制.csproj)
        $ver = $xml.Project.PropertyGroup.ApplicationVersion
        if (-not $ver) { $ver = "0.0.0.0" }
        $ts = Get-Date -Format "yyyyMMdd-HHmmss"
        echo "ver=$ver" >> $env:GITHUB_OUTPUT
        echo "ts=$ts" >> $env:GITHUB_OUTPUT

    - name: 打包为 ZIP
      run: |
        cd publish
        7z a -tzip "../USB-Files-Copy-v${{ steps.version.outputs.ver }}.zip" Client Server

    # ==================== 上传产物 ====================
    - name: 上传 ZIP 到 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: USB-Files-Copy-v${{ steps.version.outputs.ver }}
        path: USB-Files-Copy-v${{ steps.version.outputs.ver }}.zip

    # ==================== 发布到 Releases ====================
    - name: 发布到 GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.ver }}
        name: "v${{ steps.version.outputs.ver }}"
        body: |
          ## U盘文件复制器 v${{ steps.version.outputs.ver }}

          **构建时间**: ${{ steps.version.outputs.ts }}
          **提交**: ${{ github.sha }}

          ### 压缩包内容
          ```
          USB-Files-Copy-v${{ steps.version.outputs.ver }}.zip
          ├── Client/          # Windows 客户端程序
          └── Server/          # ASP.NET Core 服务端
              ├── win-x64/     # Windows x64
              ├── linux-x64/   # Linux x64
              └── osx-x64/     # macOS x64
          ```

          ### 部署说明

          **客户端**: 解压 `Client/` 文件夹，运行 `U盘文件复制器.exe`

          **服务端**: 选择对应平台目录，先安装 [.NET 8 Runtime](https://dotnet.microsoft.com/download/dotnet/8.0)，然后运行：
          ```bash
          # Windows
          cd Server/win-x64 && U盘文件复制.Server.exe

          # Linux/macOS
          cd Server/linux-x64 && ./U盘文件复制.Server
          ```
          默认监听 `http://localhost:5000`，Web 管理面板直接浏览器访问。
        draft: false
        prerelease: false
        files: USB-Files-Copy-v${{ steps.version.outputs.ver }}.zip
